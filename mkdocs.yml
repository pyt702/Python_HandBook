site_name: Python Handbook for Spring Boot Developers
site_url: https://your-internal-link.accenture.com
site_description: Learn Python, FastAPI, Pydantic, LangGraph and LangFuse

theme:
  name: material
  
  # Logo placement configuration
  logo: assets/Accenture-logo.png
  favicon: assets/favicon.ico
  
  features:
    - navigation.tabs          # Keeps your top tab layout
    - navigation.tabs.sticky   # Pins tabs to top on scroll
    - navigation.instant       # Fast SPA-like page loads
    - navigation.tracking      # Highlights right TOC as you scroll
    - navigation.top           # "Back to top" button
    - navigation.expand
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy        # Adds a click-to-copy button to code blocks
    - content.code.annotate    # Allows code annotations
    - toc.integrate            # Integrates TOC into the left sidebar
    - toc.follow

  palette:
    # Palette toggle for Light Mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black          # Sleek dark header accentuates the logo
      accent: deep purple     # Accenture purple for links/buttons
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for Dark Mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

# Typography tuning
extra_css:
  - stylesheets/extra.css

nav:
  - 🏠 Home: index.md
  - 🚀 Getting Started: getting-started/index.md
  - 🐍 Python Basics: chapter-0/index.md
  - 📚 Core Python: chapter-1/index.md
  - 📦 Pydantic: chapter-2/index.md
  - ⚡ FastAPI: chapter-3/index.md
  - 🤖 LangGraph: chapter-4/index.md
  - 📈 LangFuse: chapter-5/index.md
  - 🎓 EduTrack Project: chapter-6/index.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
